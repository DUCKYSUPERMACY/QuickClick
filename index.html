<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QuickClick</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; touch-action: none; font-family: sans-serif; outline: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000000; color: white; transition: background-color 0.3s ease; }
        
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 1; }
        .active-screen { opacity: 1; pointer-events: auto; }

        /* Main Menu */
        #main-menu h1 { font-size: 8vmin; color: #ffffff; letter-spacing: 3px; text-shadow: 0 0 20px rgba(255, 255, 255, 0.4); margin-bottom: 5vmin; }
        .menu-btn { background-color: #111; color: white; border: 2px solid #333; padding: 2vmin 6vmin; margin: 1.5vmin; font-size: 3.5vmin; font-weight: bold; border-radius: 12px; width: 50vmin; cursor: pointer; transition: 0.1s; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .menu-btn:active { background-color: #222; border-color: #aaa; transform: scale(0.95); }
        
        /* Top Bar */
        .top-bar-btn { position: absolute; top: 3vmin; font-size: 4.5vmin; background: none; border: none; color: rgba(255,255,255,0.6); cursor: pointer; z-index: 10; transition: transform 0.1s; }
        .top-bar-btn:active { transform: scale(0.8); color: white; }
        #back-btn { left: 4vmin; }
        #ingame-settings-btn { right: 4vmin; }
        #game-container { display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; }

        /* The Button Physics */
        #btn-rim { width: 65vmin; height: 65vmin; aspect-ratio: 1/1; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #555 0%, #222 50%, #0a0a0a 100%); box-shadow: 0 15px 35px rgba(0,0,0,0.9), inset 0 2px 5px rgba(255,255,255,0.4), inset 0 -4px 10px rgba(0,0,0,0.8); border: 4px solid #111; display: flex; justify-content: center; align-items: center; position: relative; }
        #btn-center { width: 50vmin; height: 50vmin; border-radius: 50%; background: #ff0000; box-shadow: inset 0 10px 20px rgba(255,255,255,0.5), inset 0 -15px 30px rgba(0,0,0,0.6), 0 10px 20px rgba(0,0,0,0.9); transition: transform 0.05s ease-out, box-shadow 0.05s ease-out; cursor: pointer; }
        .is-pressed { transform: scale(0.95) translateY(2vmin) !important; box-shadow: inset 0 5px 10px rgba(255,255,255,0.2), inset 0 -5px 15px rgba(0,0,0,0.8), 0 2px 5px rgba(0,0,0,0.9) !important; }
        
        @keyframes popIn { 0% { transform: scale(0); } 60% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .animate-pop { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        /* Overlays */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 100; }
        .active-overlay { opacity: 1 !important; pointer-events: auto !important; }
        
        .modal-rect { width: 85%; max-width: 600px; max-height: 85%; background: rgba(25, 25, 25, 0.95); border: 2px solid #444; border-radius: 20px; padding: 4vmin; display: flex; flex-direction: column; align-items: center; box-shadow: 0 20px 50px rgba(0,0,0,0.9); }
        #settings-circle { width: 95vmin; height: 95vmin; border-radius: 50%; background: rgba(20, 20, 20, 0.95); border: 2px solid #444; box-shadow: 0 0 50px rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3vmin; }

        .modal-title { font-size: 4.5vmin; font-weight: bold; color: #ffffff; margin-bottom: 2vmin; text-align: center;}
        .modal-sub { font-size: 2.2vmin; color: #aaa; margin-bottom: 3vmin; text-align: center; }
        
        .setting-row { display: flex; align-items: center; width: 85%; justify-content: space-between; margin-bottom: 2vmin;}
        .setting-label { font-size: 2.5vmin; width: 25%; color: #ccc;}
        input[type="range"] { width: 50%; accent-color: #ffffff; }
        input[type="text"] { padding: 1.5vmin; background: #0b0b0b; border: 1px solid #555; color: white; text-align: center; font-size: 2.5vmin; border-radius: 8px; width: 100%; }
        
        .color-columns { display: flex; width: 85%; justify-content: space-between; margin-bottom: 2vmin;}
        .color-col { width: 48%; display: flex; flex-direction: column; align-items: center; }
        .col-title { font-size: 2vmin; margin-bottom: 1vmin; color: #aaa;}
        .swatch-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 1vmin; margin-bottom: 1vmin; width: 100%;}
        .swatch { width: 4vmin; height: 4vmin; border-radius: 50%; border: 1px solid #777; cursor: pointer; transition: 0.1s; }
        .swatch:active { transform: scale(0.7); }

        .saves-list { width: 100%; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 1.5vmin; margin-bottom: 3vmin; padding-right: 1vmin; }
        .save-slot { background: #111; border: 1px solid #444; border-radius: 10px; padding: 3vmin; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.1s; }
        .save-slot:active { background: #222; transform: scale(0.98); }
        .save-name { font-size: 3vmin; font-weight: bold; color: #fff; }
        .save-clicks { font-size: 2.5vmin; color: #888; }

        .action-btn { background: #222; border: 2px solid #555; border-radius: 8px; color: #fff; padding: 1.5vmin 5vmin; font-size: 2.5vmin; cursor: pointer; font-weight: bold; transition: 0.1s; }
        .action-btn:active { background: #444; transform: scale(0.95); }
        .close-btn-circle { display: flex; flex-direction: column; align-items: center; margin-top: 2vmin; }

        /* The Crash Logger Banner */
        #toast { position: absolute; top: 5%; left: 50%; transform: translateX(-50%); background: #cc0000; color: white; padding: 2vmin 4vmin; border-radius: 8px; font-size: 2.5vmin; font-weight: bold; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 999; text-align: center; width: 85%; }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div id="main-menu" class="screen active-screen">
        <h1>QUICKCLICK</h1>
        <button class="menu-btn" onclick="startNewGame()">New Game</button>
        <button class="menu-btn" onclick="openLoadMenu()">Load Game</button>
        <button class="menu-btn" onclick="openSettings()">Settings</button>
    </div>

    <div id="game-screen" class="screen">
        <button id="back-btn" class="top-bar-btn" onclick="openQuitMenu()">←</button>
        <button id="ingame-settings-btn" class="top-bar-btn" onclick="openSettings()">⚙️</button>
        <div id="game-container">
            <div id="btn-rim">
                <div id="btn-center"></div>
            </div>
        </div>
    </div>

    <div id="settings-overlay" class="overlay">
        <div id="settings-circle">
            <div class="modal-title" style="margin-bottom:0;">Settings</div>
            <div class="modal-sub" style="margin-bottom:2vmin;">Global Options</div>
            
            <div class="setting-row">
                <div class="setting-label">Volume</div>
                <input type="range" id="vol-slider" min="0" max="100" value="100">
                <input type="text" id="vol-input" style="width:15%; padding: 1vmin;" value="100">
            </div>

            <div class="color-columns">
                <div class="color-col">
                    <div class="col-title">Button</div>
                    <div class="swatch-grid" id="btn-swatches"></div>
                    <input type="text" id="hex-btn" placeholder="#HEXCODE">
                </div>
                <div class="color-col">
                    <div class="col-title">Background</div>
                    <div class="swatch-grid" id="bg-swatches"></div>
                    <input type="text" id="hex-bg" placeholder="#HEXCODE">
                </div>
            </div>

            <button class="action-btn close-btn-circle" onclick="closeOverlay('settings-overlay')">
                <span style="font-weight: bold; font-size: 3.5vmin;">[ X ]</span>
                <span style="font-size: 1.8vmin; margin-top: 0.5vmin;">Close</span>
            </button>
        </div>
    </div>

    <div id="load-overlay" class="overlay">
        <div class="modal-rect">
            <div class="modal-title">Load Game</div>
            <div class="saves-list" id="saves-container"></div>
            <button class="action-btn" onclick="closeOverlay('load-overlay')">Cancel</button>
        </div>
    </div>

    <div id="quit-overlay" class="overlay">
        <div class="modal-rect">
            <div class="modal-title">Quitting?</div>
            <div class="modal-sub" id="snarky-roast">Leaving so soon?</div>
            <div style="width: 100%; margin-bottom: 3vmin;">
                <div class="col-title" style="text-align: left; color: white;">Save Name:</div>
                <input type="text" id="save-name-input" onfocus="this.select()" placeholder="Game Name">
            </div>
            <div style="display: flex; gap: 2vmin; width: 100%;">
                <button class="action-btn" style="flex: 1; background: #555;" onclick="closeOverlay('quit-overlay')">Resume</button>
                <button class="action-btn" style="flex: 1; background: #cc0000; border-color: #ff3333;" onclick="confirmQuit()">Save & Exit</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. THE CRASH LOGGER (If anything breaks, it tells you on screen) ---
        window.onerror = function(msg, url, line) {
            const t = document.getElementById('toast');
            t.textContent = "Error Line " + line + ": " + msg;
            t.style.opacity = 1;
            return false;
        };

        try {
            // --- 2. OFFLINE SERVICE WORKER (PWA) ---
            if ('serviceWorker' in navigator) {
                const swCode = `self.addEventListener('fetch', (e) => { e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))); });`;
                const blob = new Blob([swCode], {type: 'application/javascript'});
                navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
            }

            // --- 3. SAFE STORAGE SCANNER ---
            let storageWorking = false;
            try { localStorage.setItem('test', '1'); localStorage.removeItem('test'); storageWorking = true; } catch(e) {}

            const GLOBAL_KEY = "QC_Global_Settings";
            const SAVES_KEY = "QC_Save_Files";
            
            let globalConfig = { vol: 100, btnHex: "#cc0000", bgHex: "#000000" };
            let saveFiles = []; 
            let currentSession = { id: null, name: "", clicks: 0 };
            
            const presetColors = ["#FF0000", "#FFA500", "#FFFF00", "#008000", "#0000FF", "#4B0082", "#EE82EE", "#000000", "#FFFFFF", "#808080"];
            const roasts = ["Fingers getting tired?", "Going to touch grass?", "Taking a break to ice those thumbs?", "Save and run away, coward.", "Wow, giving up already?"];

            const screens = { menu: document.getElementById('main-menu'), game: document.getElementById('game-screen') };
            const toastEl = document.getElementById('toast');
            const btnRim = document.getElementById('btn-rim');
            const btnCenter = document.getElementById('btn-center');

            function safeSet(key, val) { if(storageWorking) localStorage.setItem(key, val); }
            function safeGet(key) { return storageWorking ? localStorage.getItem(key) : null; }

            // Audio Setup
            let audioCtx = null;
            function playClickSound() {
                try {
                    const AC = window.AudioContext || window.webkitAudioContext;
                    if (!AC || globalConfig.vol == 0) return;
                    if (!audioCtx) audioCtx = new AC();
                    if (audioCtx.state === 'suspended') audioCtx.resume();
                    
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
                    
                    gain.gain.setValueAtTime(globalConfig.vol / 100, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                    
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
                } catch(e) {}
            }

            function loadMemory() {
                const sGlob = safeGet(GLOBAL_KEY);
                if (sGlob) { try { globalConfig = { ...globalConfig, ...JSON.parse(sGlob) }; } catch(e){} }
                const sFiles = safeGet(SAVES_KEY);
                if (sFiles) { try { saveFiles = JSON.parse(sFiles); } catch(e){} }
                applyGlobalSettings();
            }

            function saveMemory() {
                safeSet(GLOBAL_KEY, JSON.stringify(globalConfig));
                safeSet(SAVES_KEY, JSON.stringify(saveFiles));
            }

            function autoSaveCurrent() {
                if (!currentSession.id) return;
                let existing = saveFiles.find(s => s.id === currentSession.id);
                if (existing) { existing.clicks = currentSession.clicks; existing.name = currentSession.name; existing.timestamp = Date.now(); } 
                else { saveFiles.push({...currentSession, timestamp: Date.now()}); }
                saveMemory();
            }

            function applyGlobalSettings() {
                document.body.style.backgroundColor = globalConfig.bgHex;
                btnCenter.style.background = globalConfig.btnHex;
                document.getElementById('vol-slider').value = globalConfig.vol; 
                document.getElementById('vol-input').value = globalConfig.vol;
                document.getElementById('hex-btn').value = globalConfig.btnHex; 
                document.getElementById('hex-bg').value = globalConfig.bgHex;
            }

            // Window UI Navigation
            window.openOverlay = function(id) { document.getElementById(id).classList.add('active-overlay'); };
            window.closeOverlay = function(id) { document.getElementById(id).classList.remove('active-overlay'); };
            window.openSettings = function() { openOverlay('settings-overlay'); };

            window.startNewGame = function() {
                try { if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{}); } catch(e){}
                currentSession = { id: 'game_' + Date.now(), name: `Game ${saveFiles.length + 1}`, clicks: 0 };
                autoSaveCurrent();
                launchGameScreen();
            };

            window.openLoadMenu = function() {
                const c = document.getElementById('saves-container');
                c.innerHTML = saveFiles.length === 0 ? '<div style="text-align:center; color:#888;">No saves yet. Go click something!</div>' : '';
                [...saveFiles].sort((a,b) => b.timestamp - a.timestamp).forEach(save => {
                    const div = document.createElement('div');
                    div.className = 'save-slot';
                    div.innerHTML = `<span class="save-name">${save.name}</span><span class="save-clicks">${save.clicks} Clicks</span>`;
                    div.onclick = () => { currentSession = { id: save.id, name: save.name, clicks: save.clicks }; closeOverlay('load-overlay'); launchGameScreen(); };
                    c.appendChild(div);
                });
                openOverlay('load-overlay');
            };

            window.openQuitMenu = function() {
                document.getElementById('snarky-roast').textContent = roasts[Math.floor(Math.random() * roasts.length)];
                document.getElementById('save-name-input').value = currentSession.name;
                openOverlay('quit-overlay');
            };

            window.confirmQuit = function() {
                let name = document.getElementById('save-name-input').value.trim();
                currentSession.name = name === "" ? `Game ${saveFiles.length}` : name;
                autoSaveCurrent();
                closeOverlay('quit-overlay');
                screens.game.classList.remove('active-screen');
                screens.menu.classList.add('active-screen');
            };

            function launchGameScreen() {
                screens.menu.classList.remove('active-screen');
                screens.game.classList.add('active-screen');
                btnRim.classList.remove('animate-pop');
                void btnRim.offsetWidth;
                btnRim.classList.add('animate-pop');
            }

            let toastTimeout;
            function showToast(msg) {
                toastEl.textContent = msg; toastEl.style.opacity = 1;
                clearTimeout(toastTimeout); toastTimeout = setTimeout(() => { toastEl.style.opacity = 0; }, 3000);
            }

            // Setting Updates
            function updateColor(type, hex) {
                if (!/^#([0-9A-F]{3}){1,2}$/i.test(hex)) { showToast("Invalid Hex Code!"); applyGlobalSettings(); return; }
                if (type === 'btn') globalConfig.btnHex = hex; else globalConfig.bgHex = hex;
                applyGlobalSettings(); saveMemory();
            }

            ['btn', 'bg'].forEach(type => {
                const grid = document.getElementById(type + '-swatches');
                presetColors.forEach(color => {
                    const div = document.createElement('div'); div.className = 'swatch'; div.style.backgroundColor = color;
                    div.onclick = () => { document.getElementById('hex-' + type).value = color; updateColor(type, color); };
                    grid.appendChild(div);
                });
                document.getElementById('hex-' + type).addEventListener('change', (e) => updateColor(type, e.target.value));
            });

            document.getElementById('vol-slider').addEventListener('input', (e) => { globalConfig.vol = e.target.value; applyGlobalSettings(); saveMemory(); });
            document.getElementById('vol-input').addEventListener('change', (e) => { globalConfig.vol = e.target.value; applyGlobalSettings(); saveMemory(); });

            // Button Physics Fix (100% Reliable touch events)
            function pressDown(e) { e.preventDefault(); btnCenter.classList.add('is-pressed'); playClickSound(); currentSession.clicks++; autoSaveCurrent(); }
            function pressUp(e) { e.preventDefault(); btnCenter.classList.remove('is-pressed'); }

            btnCenter.addEventListener('touchstart', pressDown, {passive: false});
            btnCenter.addEventListener('touchend', pressUp);
            btnCenter.addEventListener('mousedown', pressDown);
            btnCenter.addEventListener('mouseup', pressUp);
            btnCenter.addEventListener('mouseleave', pressUp);

            loadMemory();

        } catch (fatalError) {
            // If the script utterly fails, show it on the screen so we can fix it.
            const t = document.getElementById('toast');
            t.textContent = "FATAL CRASH: " + fatalError.message;
